    <script>
        const groups = document.querySelectorAll(".group");
        const cardStages = document.querySelectorAll(".card-stage");
        const tocLinks = document.querySelectorAll(".mini-toc a");

        let scrollTicking = false;
        let tocClickLock = false;
        let tocClickTimer = null;

        function toggleCard(stage) {
            const currentGroup = stage.closest(".group");

            if (!currentGroup) {
                return;
            }

            const willOpen = !currentGroup.classList.contains("open");

            currentGroup.classList.toggle("open", willOpen);
            stage.setAttribute("aria-expanded", String(willOpen));
        }

        function setActiveToc(groupId) {
            tocLinks.forEach(link => {
                const isCurrent = link.getAttribute("href") === `#${groupId}`;

                link.classList.toggle("active", isCurrent);

                if (isCurrent) {
                    link.setAttribute("aria-current", "true");
                } else {
                    link.removeAttribute("aria-current");
                }
            });
        }

        function updateActiveTocByScroll() {
            if (tocClickLock) {
                return;
            }

            const viewportCenter = window.innerHeight / 2;
            let closestGroup = null;
            let closestDistance = Infinity;

            groups.forEach(group => {
                const stage = group.querySelector(".card-stage");

                if (!stage) {
                    return;
                }

                const rect = stage.getBoundingClientRect();
                const cardCenter = rect.top + rect.height / 2;
                const distance = Math.abs(cardCenter - viewportCenter);

                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestGroup = group;
                }
            });

            if (closestGroup) {
                setActiveToc(closestGroup.id);
            }
        }

        cardStages.forEach(stage => {
            stage.addEventListener("click", () => {
                toggleCard(stage);

                requestAnimationFrame(updateActiveTocByScroll);
                window.setTimeout(updateActiveTocByScroll, 850);
            });

            stage.addEventListener("keydown", event => {
                if (event.key !== "Enter" && event.key !== " ") {
                    return;
                }

                event.preventDefault();
                toggleCard(stage);

                requestAnimationFrame(updateActiveTocByScroll);
                window.setTimeout(updateActiveTocByScroll, 850);
            });
        });

        tocLinks.forEach(link => {
            link.addEventListener("click", event => {
                event.preventDefault();

                const targetGroup = document.querySelector(
                    link.getAttribute("href")
                );

                if (!targetGroup) {
                    return;
                }

                tocClickLock = true;
                setActiveToc(targetGroup.id);

                targetGroup.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });

                window.clearTimeout(tocClickTimer);

                tocClickTimer = window.setTimeout(() => {
                    tocClickLock = false;
                    updateActiveTocByScroll();
                }, 900);
            });
        });

        function handleScroll() {
            if (scrollTicking) {
                return;
            }

            scrollTicking = true;

            requestAnimationFrame(() => {
                updateActiveTocByScroll();
                scrollTicking = false;
            });
        }

        window.addEventListener("scroll", handleScroll, {
            passive: true
        });

        window.addEventListener("resize", () => {
            requestAnimationFrame(updateActiveTocByScroll);
        });

        window.addEventListener("load", () => {
            updateActiveTocByScroll();
        });

        document.addEventListener("keydown", event => {
            if (event.key !== "Escape") {
                return;
            }

            groups.forEach(group => {
                group.classList.remove("open");

                const stage = group.querySelector(".card-stage");

                if (stage) {
                    stage.setAttribute("aria-expanded", "false");
                }
            });

            window.setTimeout(updateActiveTocByScroll, 850);
        });
    </script>
