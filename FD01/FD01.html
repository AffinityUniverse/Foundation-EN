<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FD01 | Class Communication</title>

    <meta property="og:title" content="FD01 | Class Communication">
    <meta property="og:description" content="수업 참여, 질문하기, 도움 요청하기, 온라인 상태 확인 표현을 한곳에서 확인합니다.">
    <meta property="og:image" content="FD01-1/Participation/v1-1.png">

    <link rel="stylesheet" href="../questionnaire.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --index-blue: #0846B0;
            --index-deep-blue: #062F78;
            --index-yellow: #FFCF03;
            --index-white: #FFFFFF;
            --index-line: rgba(255, 255, 255, 0.22);
        }

        body.fd01-index {
            display: block;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 12% 10%, rgba(255, 207, 3, 0.16), transparent 30%),
                linear-gradient(145deg, var(--index-blue), var(--index-deep-blue));
            color: var(--index-white);
            font-family: "Montserrat", Arial, sans-serif;
        }

        .course-wrap {
            width: min(1120px, calc(100% - 40px));
            margin: 0 auto;
            padding: 78px 0 90px;
        }

        .course-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            padding: 9px 14px;
            border: 1px solid var(--index-line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 13px;
            font-weight: 600;
        }

        .course-badge::before {
            content: "";
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--index-yellow);
            box-shadow: 0 0 0 5px rgba(255, 207, 3, 0.13);
        }

        .course-title {
            max-width: 900px;
            margin: 0;
            font-size: clamp(48px, 8vw, 96px);
            line-height: 0.98;
            letter-spacing: -0.035em;
        }

        .course-title span {
            color: var(--index-yellow);
        }

        .course-description {
            max-width: 720px;
            margin: 28px 0 52px;
            color: rgba(255, 255, 255, 0.78);
            font-size: clamp(16px, 2vw, 21px);
            font-weight: 600;
            line-height: 1.7;
            word-break: keep-all;
        }

        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .lesson-card {
            position: relative;
            display: flex;
            min-height: 220px;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            overflow: hidden;
            border: 1px solid var(--index-line);
            border-radius: 28px;
            color: var(--index-white);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 20px 50px rgba(0, 20, 70, 0.18);
            text-decoration: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition:
                transform 0.28s ease,
                border-color 0.28s ease,
                background-color 0.28s ease,
                box-shadow 0.28s ease;
        }

        .lesson-card::after {
            content: "↗";
            position: absolute;
            top: 27px;
            right: 29px;
            display: grid;
            width: 45px;
            height: 45px;
            place-items: center;
            border-radius: 50%;
            color: var(--index-blue);
            background: var(--index-yellow);
            font-size: 23px;
            font-weight: 600;
            transition: transform 0.28s ease;
        }

        .lesson-card:hover,
        .lesson-card:focus-visible {
            transform: translateY(-7px);
            border-color: rgba(255, 207, 3, 0.85);
            background: rgba(255, 255, 255, 0.14);
            box-shadow: 0 28px 70px rgba(0, 20, 70, 0.3);
            outline: none;
        }

        .lesson-card:hover::after,
        .lesson-card:focus-visible::after {
            transform: rotate(45deg) scale(1.08);
        }

        .lesson-number {
            color: var(--index-yellow);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.13em;
        }

        .lesson-name {
            max-width: calc(100% - 52px);
            margin: 36px 0 8px;
            font-size: clamp(25px, 3vw, 38px);
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: -0.035em;
        }

        .lesson-korean {
            margin: 0;
            color: rgba(255, 255, 255, 0.68);
            font-size: 15px;
            font-weight: 600;
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 35px;
            padding-top: 24px;
            border-top: 1px solid var(--index-line);
            color: rgba(255, 255, 255, 0.55);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        @media (max-width: 720px) {
            .course-wrap {
                width: min(100% - 26px, 1120px);
                padding: 50px 0 65px;
            }

            .course-description {
                margin-bottom: 35px;
            }

            .lesson-grid {
                grid-template-columns: 1fr;
            }

            .lesson-card {
                min-height: 190px;
                padding: 24px;
                border-radius: 23px;
            }

            .lesson-card::after {
                top: 21px;
                right: 21px;
            }

            .course-footer {
                flex-direction: column;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .lesson-card,
            .lesson-card::after {
                transition: none;
            }
        }
    </style>
</head>

<body class="fd01-index">
    <main class="course-wrap">
        <div class="course-badge">FD01 · LESSON INDEX</div>

        <h1 class="course-title">
            Class<br>
            <span>Communication</span>
        </h1>

        <p class="course-description">
            수업 참여와 질문하기부터 도움 요청, 온라인 상태 확인까지
            FD01의 네 가지 학습 페이지를 한곳에서 확인합니다.
        </p>

        <section class="lesson-grid" aria-label="FD01 학습 목록">
            <a class="lesson-card" href="FD01-1/FD01-1.html">
                <span class="lesson-number">LESSON 01</span>
                <div>
                    <h2 class="lesson-name">Participation</h2>
                    <p class="lesson-korean">수업에 참여하고 응답하기</p>
                </div>
            </a>

            <a class="lesson-card" href="FD01-2/FD01-2.html">
                <span class="lesson-number">LESSON 02</span>
                <div>
                    <h2 class="lesson-name">Questions</h2>
                    <p class="lesson-korean">질문하고 확인하기</p>
                </div>
            </a>

            <a class="lesson-card" href="FD01-3/FD01-3.html">
                <span class="lesson-number">LESSON 03</span>
                <div>
                    <h2 class="lesson-name">Asking for Help</h2>
                    <p class="lesson-korean">도움을 요청하기</p>
                </div>
            </a>

            <a class="lesson-card" href="FD01-4/FD01-4.html">
                <span class="lesson-number">LESSON 04</span>
                <div>
                    <h2 class="lesson-name">Online Check</h2>
                    <p class="lesson-korean">온라인 상태 확인하기</p>
                </div>
            </a>
        </section>

        <footer class="course-footer">
            <span>AFFINITY UNIVERSE</span>
            <span>FD01 · DESIGN ENGLISH</span>
        </footer>
    </main>
</body>
</html>
