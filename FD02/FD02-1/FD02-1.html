    <script>
        const groups = document.querySelectorAll(".group");
        const cardStages = document.querySelectorAll(".card-stage");
        const tocLinks = document.querySelectorAll(".mini-toc a");

        let scrollTicking = false;
        let tocClickLock = false;
        let tocClickTimer = null;

        function toggleCard(stage) {
            const group = stage.closest(".group");
            if (!group) return;

            const willOpen = !group.classList.contains("open");
            group.classList.toggle("open", willOpen);
            stage.setAttribute("aria-expanded", String(willOpen));
        }

        function setActiveToc(groupId) {
            tocLinks.forEach(link => {
                const active = link.getAttribute("href") === `#${groupId}`;
                link.classList.toggle("active", active);

                if (active) {
                    link.setAttribute("aria-current", "true");
                    link.scrollIntoView({ block: "nearest" });
                } else {
                    link.removeAttribute("aria-current");
                }
            });
        }

        function updateActiveTocByScroll() {
            if (tocClickLock) return;

            const viewportCenter = window.innerHeight / 2;
            let closest = null;
            let minDistance = Infinity;

            groups.forEach(group => {
                const stage = group.querySelector(".card-stage");
                if (!stage) return;

                const rect = stage.getBoundingClientRect();
                const distance = Math.abs(rect.top + rect.height / 2 - viewportCenter);

                if (distance < minDistance) {
                    minDistance = distance;
                    closest = group;
                }
            });

            if (closest) setActiveToc(closest.id);
        }

        cardStages.forEach(stage => {
            stage.addEventListener("click", () => {
                toggleCard(stage);
                requestAnimationFrame(updateActiveTocByScroll);
                setTimeout(updateActiveTocByScroll, 850);
            });

            stage.addEventListener("keydown", event => {
                if (event.key !== "Enter" && event.key !== " ") return;
                event.preventDefault();
                toggleCard(stage);
                requestAnimationFrame(updateActiveTocByScroll);
                setTimeout(updateActiveTocByScroll, 850);
            });
        });

        tocLinks.forEach(link => {
            link.addEventListener("click", event => {
                event.preventDefault();

                const target = document.querySelector(link.getAttribute("href"));
                if (!target) return;

                tocClickLock = true;
                setActiveToc(target.id);
                target.scrollIntoView({ behavior: "smooth", block: "center" });

                clearTimeout(tocClickTimer);
                tocClickTimer = setTimeout(() => {
                    tocClickLock = false;
                    updateActiveTocByScroll();
                }, 900);
            });
        });

        window.addEventListener("scroll", () => {
            if (scrollTicking) return;
            scrollTicking = true;

            requestAnimationFrame(() => {
                updateActiveTocByScroll();
                scrollTicking = false;
            });
        }, { passive: true });

        window.addEventListener("resize", updateActiveTocByScroll);
        window.addEventListener("load", updateActiveTocByScroll);

        document.addEventListener("keydown", event => {
            if (event.key !== "Escape") return;

            groups.forEach(group => {
                group.classList.remove("open");
                const stage = group.querySelector(".card-stage");
                if (stage) stage.setAttribute("aria-expanded", "false");
            });

            setTimeout(updateActiveTocByScroll, 850);
        });
    </script>
