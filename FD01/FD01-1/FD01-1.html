<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FD01-1</title>

    <link rel="stylesheet" href="../../questionnaire.css">
    <script src="../../flashcard-decks.js" defer></script>
    <script src="../../flashcard.js" defer></script>
</head>

<body class="flashcard-page" data-deck="fd01-1">
    <header class="title" id="pageTitle"></header>

    <main class="flashcard-workspace">
        <div class="card-list">
            <div class="group">
                <section class="card-stage" id="cardStage" tabindex="0" role="button" aria-label="영문 카드 열기"
                    aria-expanded="false">
                    <img class="korean-card" id="koreanCard" src="" alt="" draggable="false">

                    <div class="english-door">
                        <div class="door-face door-front" id="doorFront"></div>
                        <div class="door-face door-back" id="doorBack"></div>
                    </div>
                </section>
            </div>
        </div>

        <div class="card-navigation">
            <nav class="mini-toc horizontal-toc" id="cardToc" aria-label="카드 가로 목차"></nav>
        </div>

        <div class="keyboard-hint">
            <kbd>Space</kbd> 카드 열기 ·
            <kbd>←</kbd><kbd>→</kbd> 카드 이동
        </div>
    </main>
</body>

</html>
