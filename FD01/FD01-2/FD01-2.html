    <script>
        const groups =
            document.querySelectorAll(".group");

        const cardStages =
            document.querySelectorAll(".card-stage");

        const tocLinks =
            document.querySelectorAll(".mini-toc a");

        let scrollTicking = false;
        let tocClickLock = false;
        let tocClickTimer = null;


        /*
         * 선택한 카드만 독립적으로 열고 닫기
         */
        function toggleCard(stage) {
            const currentGroup =
                stage.closest(".group");

            if (!currentGroup) {
                return;
            }

            const willOpen =
                !currentGroup.classList.contains("open");

            currentGroup.classList.toggle(
                "open",
                willOpen
            );

            stage.setAttribute(
                "aria-expanded",
                String(willOpen)
            );
        }


        /*
         * 지정된 카드와 연결된 목차만 활성화
         */
        function setActiveToc(groupId) {
            tocLinks.forEach(link => {
                const targetId =
                    link.getAttribute("href");

                const isCurrent =
                    targetId === `#${groupId}`;

                link.classList.toggle(
                    "active",
                    isCurrent
                );

                if (isCurrent) {
                    link.setAttribute(
                        "aria-current",
                        "true"
                    );
                } else {
                    link.removeAttribute(
                        "aria-current"
                    );
                }
            });
        }


        /*
         * 화면 중앙과 가장 가까운 카드 탐색
         */
        function updateActiveTocByScroll() {
            if (tocClickLock) {
                return;
            }

            const viewportCenter =
                window.innerHeight / 2;

            let closestGroup = null;
            let closestDistance = Infinity;

            groups.forEach(group => {
                const stage =
                    group.querySelector(".card-stage");

                if (!stage) {
                    return;
                }

                const rect =
                    stage.getBoundingClientRect();

                const cardCenter =
                    rect.top + rect.height / 2;

                const distance =
                    Math.abs(
                        cardCenter - viewportCenter
                    );

                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestGroup = group;
                }
            });

            if (closestGroup) {
                setActiveToc(
                    closestGroup.id
                );
            }
        }


        /*
         * 카드 클릭 및 키보드 작동
         */
        cardStages.forEach(stage => {
            stage.addEventListener(
                "click",
                () => {
                    toggleCard(stage);

                    requestAnimationFrame(
                        updateActiveTocByScroll
                    );

                    window.setTimeout(
                        updateActiveTocByScroll,
                        850
                    );
                }
            );

            stage.addEventListener(
                "keydown",
                event => {
                    if (
                        event.key !== "Enter" &&
                        event.key !== " "
                    ) {
                        return;
                    }

                    event.preventDefault();

                    toggleCard(stage);

                    requestAnimationFrame(
                        updateActiveTocByScroll
                    );

                    window.setTimeout(
                        updateActiveTocByScroll,
                        850
                    );
                }
            );
        });


        /*
         * 목차 클릭 시 해당 카드로 이동
         */
        tocLinks.forEach(link => {
            link.addEventListener(
                "click",
                event => {
                    event.preventDefault();

                    const targetSelector =
                        link.getAttribute("href");

                    const targetGroup =
                        document.querySelector(
                            targetSelector
                        );

                    if (!targetGroup) {
                        return;
                    }

                    tocClickLock = true;

                    setActiveToc(
                        targetGroup.id
                    );

                    targetGroup.scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });

                    window.clearTimeout(
                        tocClickTimer
                    );

                    tocClickTimer =
                        window.setTimeout(
                            () => {
                                tocClickLock = false;

                                updateActiveTocByScroll();
                            },
                            900
                        );
                }
            );
        });


        /*
         * 스크롤 이벤트 최적화
         */
        function handleScroll() {
            if (scrollTicking) {
                return;
            }

            scrollTicking = true;

            requestAnimationFrame(() => {
                updateActiveTocByScroll();

                scrollTicking = false;
            });
        }


        window.addEventListener(
            "scroll",
            handleScroll,
            {
                passive: true
            }
        );


        window.addEventListener(
            "resize",
            () => {
                requestAnimationFrame(
                    updateActiveTocByScroll
                );
            }
        );


        window.addEventListener(
            "load",
            () => {
                updateActiveTocByScroll();
            }
        );


        /*
         * ESC 키를 누르면 모든 카드 닫기
         */
        document.addEventListener(
            "keydown",
            event => {
                if (event.key !== "Escape") {
                    return;
                }

                groups.forEach(group => {
                    group.classList.remove(
                        "open"
                    );

                    const stage =
                        group.querySelector(
                            ".card-stage"
                        );

                    if (stage) {
                        stage.setAttribute(
                            "aria-expanded",
                            "false"
                        );
                    }
                });

                window.setTimeout(
                    updateActiveTocByScroll,
                    850
                );
            }
        );
    </script>
