                <div class="english-door">

                    <div class="door-face door-front" style="background-image: url('Participation/v2-1.png');"></div>

                <div class="english-door">

                    <div class="door-face door-back" style="background-image: url('Participation/v3-1.png');"></div>

                </div>
            </section>
        </div>


        <!-- ==================================
             PATTERN 1
        =================================== -->

        <div class="group" id="pattern1">
            <section class="card-stage" style="background-image: url('Participation/1-2.png');" tabindex="0"
                role="button" aria-label="Pattern 1 영문 카드 열기" aria-expanded="false">
                <div class="english-door">

        <!-- ==================================

                <div class="english-door">

                    <div class="door-face door-front" style="background-image: url('Participation/2-1.png');"></div>

                    <div class="door-face door-back" style="background-image: url('Participation/2-1.png');"></div>

                </div>
            </section>

        <!-- ==================================

        <div class="group" id="pattern3">
            <section class="card-stage" style="background-image: url('Participation/3-2.png');" tabindex="0"
                role="button" aria-label="Pattern 3 영문 카드 열기" aria-expanded="false">
                <div class="english-door">

        <!-- ==================================

        <div class="group" id="pattern4">
            <section class="card-stage" style="background-image: url('Participation/4-2.png');" tabindex="0"
                role="button" aria-label="Pattern 4 영문 카드 열기" aria-expanded="false">
                <div class="english-door">

                    <div class="door-face door-front" style="background-image: url('Participation/4-1.png');"></div>

                    <div class="door-face door-back" style="background-image: url('Participation/4-1.png');"></div>

                </div>
            </section>
        </div>


        <!-- ==================================
             PATTERN 5
        =================================== -->

        <div class="group" id="pattern5">
            <section class="card-stage" style="background-image: url('Participation/5-2.png');" tabindex="0"
                role="button" aria-label="Pattern 5 영문 카드 열기" aria-expanded="false">
                <div class="english-door">

                    <div class="door-face door-front" style="background-image: url('Participation/5-1.png');"></div>

                    <div class="door-face door-back" style="background-image: url('Participation/5-1.png');"></div>

                </div>
            </section>
        </div>

    </main>


    <script>
    const groups = document.querySelectorAll(".group");
    const cardStages = document.querySelectorAll(".card-stage");
    const tocLinks = document.querySelectorAll(".mini-toc a");

    let scrollTicking = false;


    /*
     * 선택한 카드만 독립적으로 열고 닫기
     */
    function toggleCard(stage) {
        const currentGroup = stage.closest(".group");

        if (!currentGroup) {
            return;
        }

        const willOpen =
            !currentGroup.classList.contains("open");

        currentGroup.classList.toggle(
            "open",
            willOpen
        );

        stage.setAttribute(
            "aria-expanded",
            String(willOpen)
        );
    }


    /*
     * 지정한 ID에 해당하는 목차만 활성화
     */
    function setActiveToc(groupId) {
        tocLinks.forEach(link => {
            const linkTarget =
                link.getAttribute("href");

            const isCurrent =
                linkTarget === `#${groupId}`;

            link.classList.toggle(
                "active",
                isCurrent
            );

            if (isCurrent) {
                link.setAttribute(
                    "aria-current",
                    "true"
                );
            } else {
                link.removeAttribute(
                    "aria-current"
                );
            }
        });
    }


    /*
     * 화면 중앙과 가장 가까운 카드를 찾아
     * 해당 목차를 노란색으로 활성화
     */
    function updateActiveTocByScroll() {
        const viewportCenter =
            window.innerHeight / 2;

        let closestGroup = null;
        let closestDistance = Infinity;

        groups.forEach(group => {
            const stage =
                group.querySelector(".card-stage");

            if (!stage) {
                return;
            }

            const rect =
                stage.getBoundingClientRect();

            const cardCenter =
                rect.top + rect.height / 2;

            const distance =
                Math.abs(
                    cardCenter - viewportCenter
                );

            if (distance < closestDistance) {
                closestDistance = distance;
                closestGroup = group;
            }
        });

        if (closestGroup) {
            setActiveToc(
                closestGroup.id
            );
        }
    }


    /*
     * 카드 클릭
     */
    cardStages.forEach(stage => {
        stage.addEventListener(
            "click",
            () => {
                toggleCard(stage);

                /*
                 * 카드가 열리며 위치가 변할 수 있으므로
                 * 애니메이션 도중 목차 위치도 다시 계산
                 */
                requestAnimationFrame(
                    updateActiveTocByScroll
                );

                window.setTimeout(
                    updateActiveTocByScroll,
                    850
                );
            }
        );


        /*
         * 키보드 Enter 또는 Space
         */
        stage.addEventListener(
            "keydown",
            event => {
                if (
                    event.key !== "Enter" &&
                    event.key !== " "
                ) {
                    return;
                }

                event.preventDefault();

                toggleCard(stage);

                requestAnimationFrame(
                    updateActiveTocByScroll
                );

                window.setTimeout(
                    updateActiveTocByScroll,
                    850
                );
            }
        );
    });


    /*
     * 미니 목차 클릭
     */
    tocLinks.forEach(link => {
        link.addEventListener(
            "click",
            event => {
                event.preventDefault();

                const targetSelector =
                    link.getAttribute("href");

                const targetGroup =
                    document.querySelector(
                        targetSelector
                    );

                if (!targetGroup) {
                    return;
                }

                /*
                 * 클릭한 목차를 즉시 노란색으로 표시
                 */
                setActiveToc(
                    targetGroup.id
                );

                targetGroup.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
            }
        );
    });


    /*
     * 스크롤할 때마다 실행하지 않고
     * 브라우저 화면 갱신 시점에 한 번만 계산
     */
    function handleScroll() {
        if (scrollTicking) {
            return;
        }

        scrollTicking = true;

        requestAnimationFrame(() => {
            updateActiveTocByScroll();
            scrollTicking = false;
        });
    }


    /*
     * 일반 스크롤
     */
    window.addEventListener(
        "scroll",
        handleScroll,
        {
            passive: true
        }
    );


    /*
     * 브라우저 크기가 변경될 때 재계산
     */
    window.addEventListener(
        "resize",
        () => {
            requestAnimationFrame(
                updateActiveTocByScroll
            );
        }
    );


    /*
     * 이미지가 모두 로딩된 후
     * 최초 활성 목차 정확하게 설정
     */
    window.addEventListener(
        "load",
        () => {
            updateActiveTocByScroll();
        }
    );


    /*
     * ESC 키로 열려 있는 카드 모두 닫기
     */
    document.addEventListener(
        "keydown",
        event => {
            if (event.key !== "Escape") {
                return;
            }

            groups.forEach(group => {
                group.classList.remove(
                    "open"
                );

                const stage =
                    group.querySelector(
                        ".card-stage"
                    );

                if (stage) {
                    stage.setAttribute(
                        "aria-expanded",
                        "false"
                    );
                }
            });

            window.setTimeout(
                updateActiveTocByScroll,
                850
            );
        }
    );
</script>

</body>

</html>
